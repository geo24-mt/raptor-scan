<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="db.js"></script>
    <title>Mein Listen-Baukasten</title>
</head>
<body>

<div class="container">
    <h2>Neue Liste erstellen</h2>
    <a href="dashboard.html" class="btn">🗂️ Zu meinen Sammlungen (Dashboard)</a>
    
    <div class="form-group">
        <label for="listenName">Wie soll die Liste heißen?</label>
        <input type="text" id="listenName" placeholder="z. B. Meine Krimis, Videospiele, Gewürze...">
    </div>
    
    <div class="form-group">
        <label for="attributAuswahl">Welche Eigenschaften soll die Liste haben?</label>
        <select id="attributAuswahl">
            <option value="" disabled selected>-- Bitte wählen --</option>
            <optgroup label="Bücher">
                <option value="Titel">Titel</option>
                <option value="Autor">Autor</option>
                <option value="Seitenanzahl">Seitenanzahl</option>
                <option value="Verlag">Verlag</option>
                <option value="Erscheinungsjahr">Erscheinungsjahr</option>
            </optgroup>
            <optgroup label="Musik & Film">
                <option value="Interpret">Interpret / Band</option>
                <option value="Album">Album / Song</option>
                <option value="Regisseur">Regisseur</option>
                <option value="Schauspieler">Schauspieler</option>
                <option value="Laufzeit">Laufzeit</option>
            </optgroup>
            <optgroup label="Produkte & Haushalt">
                <option value="Marke">Marke / Hersteller</option>
                <option value="Gewicht">Gewicht / Menge</option>
                <option value="Preis">Preis</option>
            </optgroup>
        </select>
        <button type="button" id="btnHinzufuegen">＋ Eigenschaft hinzufügen</button>
    </div>
    
    <div class="form-group">
        <label>Gewählte Struktur für deine Tabelle:</label>
        <div id="gewaehlteAttribute"></div>
    </div>
    
    <button type="button" id="btnSpeichern">Liste jetzt anlegen</button>
</div>

<script>
    // Initialisierung der Datenbank beim Laden der Seite
    window.onload = async function() {
        await initDB();
    };

    const dropdown = document.getElementById('attributAuswahl');
    const btnAdd = document.getElementById('btnHinzufuegen');
    const anzeigeBereich = document.getElementById('gewaehlteAttribute');
    let merkListeFuerAttribute = [];

    btnAdd.addEventListener('click', function() {
        const ausgewaehlterWert = dropdown.value;
        if (ausgewaehlterWert && !merkListeFuerAttribute.includes(ausgewaehlterWert)) {
            merkListeFuerAttribute.push(ausgewaehlterWert);
            
            const chip = document.createElement('span');
            chip.className = 'attribut-chip';
            chip.style.cursor = 'pointer';
            chip.innerText = ausgewaehlterWert + ' ✕';
            
            chip.addEventListener('click', function() {
                const index = merkListeFuerAttribute.indexOf(ausgewaehlterWert);
                if (index > -1) merkListeFuerAttribute.splice(index, 1);
                chip.remove();
            });
            anzeigeBereich.appendChild(chip);
            dropdown.value = "";
        }
    });

    const btnSpeichern = document.getElementById('btnSpeichern');
    const inputListenName = document.getElementById('listenName');

    btnSpeichern.addEventListener('click', async function() {
        const namederListe = inputListenName.value.trim();
        
        if (namederListe === "") {
            alert("Bitte gib einen Namen ein!");
            return;
        }
        if (merkListeFuerAttribute.length === 0) {
            alert("Bitte wähle mindestens eine Eigenschaft!");
            return; 
        }
        
        // Direkter Datenbank-Zugriff statt URL-Umleitung
        const attributeAlsText = merkListeFuerAttribute.join(',');
        dbQuery("INSERT INTO Listen (name, attrs) VALUES (?, ?);", [namederListe, attributeAlsText]);
        
        alert("Liste erfolgreich in der Datenbank angelegt!");
        window.location.href = "dashboard.html";
    });
</script>

</body>
</html>
