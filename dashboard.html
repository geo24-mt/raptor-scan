<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="db.js"></script>
    <title>Mein Listen-Dashboard</title>
</head>
<body>

<div class="container">
    <h2>Meine Sammlungen 🗂️</h2>
    <a href="index.html" class="btn btn-neu">＋ Neue Liste erstellen</a>
    
    <h3>Deine vorhandenen Listen:</h3>
    <div id="listenUebersicht"></div>
</div>

<script>
    window.onload = async function() {
        await initDB();
		// Test: Was sieht die Datenbank wirklich?
const debugResult = dbQuery("SELECT * FROM Listen;");
console.log("DEBUG: Alle Listen in der DB:", debugResult);
        ladeListenAnzeige();
    };

    function ladeListenAnzeige() {
        const uebersichtDiv = document.getElementById('listenUebersicht');
        uebersichtDiv.innerHTML = "";

        // SQL: Hole alle Listen aus der Datenbank
        const result = dbQuery("SELECT id, name FROM Listen;");
        
        if (result.length === 0) {
            uebersichtDiv.innerHTML = "<p style='text-align:center;'>Keine Listen vorhanden.</p>";
            return;
        }

        const listen = result[0].values;
        
        listen.forEach(liste => {
            const id = liste[0];
            const name = liste[1];

            const link = document.createElement('a');
            link.className = 'btn-liste';
            link.href = `tabelle.html?listeIndex=${id}`; // Wir nutzen die Datenbank-ID

            const spanText = document.createElement('span');
            spanText.innerText = name;

            const spanDelete = document.createElement('span');
            spanDelete.className = 'btn-delete';
            spanDelete.innerText = '✕';
            
            spanDelete.onclick = function(e) {
                e.preventDefault();
                if(confirm("Wirklich löschen?")) {
                    dbQuery("DELETE FROM Listen WHERE id = ?;", [id]);
                    dbQuery("DELETE FROM Produkte WHERE liste_id = ?;", [id]);
                    ladeListenAnzeige(); // Neu laden
                }
            };

            link.appendChild(spanText);
            link.appendChild(spanDelete);
            uebersichtDiv.appendChild(link);
        });
    }
</script>

</body>
</html>
