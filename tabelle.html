<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meine Liste</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="db.js"></script>
</head>
<body>

<div class="container">
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <a href="index.html" class="btn">📋 Zum Baukasten</a>
        <a href="dashboard.html" class="btn">🗂️ Zum Dashboard</a>
    </div>
    
    <div class="header-box" style="margin-top: 15px;">
        <h2 id="ansichtListenName">Lade Liste...</h2>
        <button class="btn btn-scan" id="btnScanStarten">📷 Code scannen</button>
    </div>
    
    <div id="scanner-container" style="display:none;">
        <div id="reader"></div>
        <button class="btn btn-stop" id="btnScanStoppen">Kamera ausschalten</button>
    </div>

    <div class="manuell-box">
        <strong>Manuelle Eingabe:</strong>
        <input type="text" id="inputBarcodeManuell" class="input-text" placeholder="Barcode-Nummer...">
        <button class="btn btn-speichern" id="btnManuellAbschicken">Hinzufügen</button>
    </div>
    
    <table id="meineDynamischeTabelle">
        <thead id="tabellenKopf"></thead>
        <tbody id="tabellenInhalt"></tbody>
    </table>
</div>

<script>
    let listenId = null;
    let html5QrcodeScanner = null;

    window.onload = async () => {
        await initDB();
        const urlParams = new URLSearchParams(window.location.search);
        listenId = urlParams.get('listeIndex');
        tabelleInitialisieren();
    };

    // Die von dir validierte API-Logik
    async function holeProduktInfos(barcode, attrs) {
        let temporaereDaten = {};
        
        // 1. Suche in OpenLibrary
        try {
            const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${barcode}&format=json&jscmd=data`);
            const bookData = await res.json();
            const b = bookData[`ISBN:${barcode}`];

            if (b) {
                attrs.forEach(attr => {
                    if (attr === "Titel" || attr === "Name" || attr === "Produkt") temporaereDaten[attr] = b.title || "Ohne Titel";
                    else if (attr === "Autor" || attr === "Marke") temporaereDaten[attr] = b.authors ? b.authors.map(a => a.name).join(', ') : "Unbekannt";
                    else if (attr === "Erscheinungsjahr") temporaereDaten[attr] = b.publish_date || "Unbekannt";
                    else if (attr === "Verlag") temporaereDaten[attr] = b.publishers ? b.publishers.map(p => p.name).join(', ') : "Unbekannt";
                    else if (attr === "Seitenanzahl" || attr === "Laufzeit" || attr === "Inhalt") temporaereDaten[attr] = b.number_of_pages ? b.number_of_pages + " Seiten" : "-";
                    else temporaereDaten[attr] = "-";
                });
                return temporaereDaten;
            }
        } catch(e) {}

        // 2. Weiche auf Lebensmittel aus
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
            const foodData = await res.json();
            const p = foodData.product;
            
            if (p) {
                attrs.forEach(attr => {
                    if (attr === "Titel" || attr === "Name" || attr === "Produkt") temporaereDaten[attr] = p.product_name || "Ohne Titel";
                    else if (attr === "Marke" || attr === "Verlag") temporaereDaten[attr] = p.brands || "Unbekannt";
                    else temporaereDaten[attr] = "-";
                });
                return temporaereDaten;
            }
        } catch(e) {}

        // 3. Fallback
        attrs.forEach(attr => temporaereDaten[attr] = "Klicke zum Eintragen");
        return temporaereDaten;
    }

    async function speichereProdukt(barcode) {
        const res = dbQuery("SELECT attrs FROM Listen WHERE id = ?", [listenId]);
        const attrs = res[0].values[0][0].split(',');
        const infoObj = await holeProduktInfos(barcode, attrs);
        
        dbQuery("INSERT INTO Produkte (liste_id, barcode, data) VALUES (?, ?, ?);", [listenId, barcode, JSON.stringify(infoObj)]);
        tabelleInitialisieren();
    }

    function tabelleInitialisieren() {
        const res = dbQuery("SELECT name, attrs FROM Listen WHERE id = ?", [listenId]);
        document.getElementById('ansichtListenName').innerText = res[0].values[0][0];
        const attrs = res[0].values[0][1].split(',');
        
        const thead = document.getElementById('tabellenKopf');
        thead.innerHTML = `<tr><th>Barcode</th>${attrs.map(a => `<th>${a}</th>`).join('')}<th>Löschen</th></tr>`;

        const prods = dbQuery("SELECT id, barcode, data FROM Produkte WHERE liste_id = ?", [listenId]);
        renderProdukte(prods.length > 0 ? prods[0].values : [], attrs);
    }

    function renderProdukte(produkte, attrs) {
        const tbody = document.getElementById('tabellenInhalt');
        tbody.innerHTML = "";
        produkte.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p[1];
            const dataObj = JSON.parse(p[2]);
            attrs.forEach(a => {
                const cell = row.insertCell(-1);
                cell.innerText = dataObj[a] || "";
                cell.contentEditable = true;
                cell.onblur = () => { dataObj[a] = cell.innerText; dbQuery("UPDATE Produkte SET data = ? WHERE id = ?", [JSON.stringify(dataObj), p[0]]); };
            });
            row.insertCell(-1).innerHTML = `<button onclick="loescheDatensatz(${p[0]})">✕</button>`;
        });
    }

    function loescheDatensatz(id) { dbQuery("DELETE FROM Produkte WHERE id = ?", [id]); tabelleInitialisieren(); }

    document.getElementById('btnManuellAbschicken').addEventListener('click', () => { const val = document.getElementById('inputBarcodeManuell').value; if(val) speichereProdukt(val); });
    
    document.getElementById('btnScanStarten').addEventListener('click', () => {
        document.getElementById('scanner-container').style.display = 'block';
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            speichereProdukt(text);
            html5QrcodeScanner.stop();
            document.getElementById('scanner-container').style.display = 'none';
        });
    });

    document.getElementById('btnScanStoppen').addEventListener('click', () => { if (html5QrcodeScanner) html5QrcodeScanner.stop().then(() => document.getElementById('scanner-container').style.display = 'none'); });
</script>
</body>
</html>
