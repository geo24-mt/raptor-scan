<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meine Liste</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="db.js"></script>
</head>
<body>

<div class="container">
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <a href="index.html" class="btn">📋 Zum Baukasten</a>
        <a href="dashboard.html" class="btn">🗂️ Zum Dashboard</a>
    </div>
    
    <div class="header-box" style="margin-top: 15px;">
        <h2 id="ansichtListenName">Lade Liste...</h2>
        <button class="btn btn-scan" id="btnScanStarten">📷 Code scannen</button>
    </div>
    
    <div id="scanner-container" style="display:none;">
        <div id="reader"></div>
        <button class="btn btn-stop" id="btnScanStoppen">Kamera ausschalten</button>
    </div>

    <div class="manuell-box">
        <strong>Manuelle Eingabe:</strong>
        <input type="text" id="inputBarcodeManuell" class="input-text" placeholder="Barcode-Nummer...">
        <button class="btn btn-speichern" id="btnManuellAbschicken">Hinzufügen</button>
    </div>
    
   <table id="meineDynamischeTabelle">
    <thead id="tabellenKopf"></thead>
    <tbody id="tabellenInhalt"></tbody>
</table>
</div>

<script>
    let listenId = null;
    let html5QrcodeScanner = null;

    window.onload = async function() {
        await initDB();
        const urlParams = new URLSearchParams(window.location.search);
        listenId = urlParams.get('listeIndex');
        tabelleInitialisieren();
    };

    // Die "Allround"-API-Logik für alles (Essen, Bücher, Werkzeug)
    async function holeProduktInfos(barcode) {
        // 1. Open Food Facts
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
            const data = await res.json();
            if (data.status === 1) return data.product.product_name;
        } catch(e) {}

        // 2. Open Library (Bücher/Medien)
        try {
            const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${barcode}&format=json&jscmd=data`);
            const data = await res.json();
            if (data[`ISBN:${barcode}`]) return data[`ISBN:${barcode}`].title;
        } catch(e) {}

        // 3. Fallback: Werkzeug/Drogerie (Barcode-Lookup Service)
        try {
            const res = await fetch(`https://api.barcodespider.com/v1/lookup?upc=${barcode}`);
            const data = await res.json();
            if (data.item_attributes) return data.item_attributes.title;
        } catch(e) {}

        return "Produkt (" + barcode + ")";
    }

    // Speichern mit API-Abfrage
    async function speichereProdukt(barcode) {
        const info = await holeProduktInfos(barcode);
        dbQuery("INSERT INTO Produkte (liste_id, barcode, data) VALUES (?, ?, ?);", [listenId, barcode, info]);
        tabelleInitialisieren();
    }

    function tabelleInitialisieren() {
        // 1. Liste und Eigenschaften laden
        const res = dbQuery("SELECT id, name, attrs FROM Listen WHERE id = ?", [listenId]);
        if (!res || res.length === 0) return;

        document.getElementById('ansichtListenName').innerText = res[0].values[0][1];
        const attrs = res[0].values[0][2] ? res[0].values[0][2].split(',') : [];

        // 2. Kopfzeile dynamisch aufbauen
        const thead = document.getElementById('tabellenKopf');
        let headHtml = "<tr><th>Barcode</th>";
        attrs.forEach(a => headHtml += `<th>${a}</th>`);
        headHtml += "<th>Löschen</th></tr>";
        thead.innerHTML = headHtml;

        // 3. Produkte laden
        const prodRes = dbQuery("SELECT id, barcode, data FROM Produkte WHERE liste_id = ?", [listenId]);
        const tbody = document.getElementById('tabellenInhalt');
        tbody.innerHTML = "";
        
        if (prodRes.length > 0) {
            prodRes[0].values.forEach(p => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = p[1];
                row.insertCell(1).innerText = p[2];
                row.insertCell(2).innerHTML = `<button class="btn-loeschen" onclick="loescheDatensatz(${p[0]})">✕</button>`;
            });
        }
    }

    function loescheDatensatz(id) {
        dbQuery("DELETE FROM Produkte WHERE id = ?", [id]);
        tabelleInitialisieren();
    }

    // Buttons verbinden
    document.getElementById('btnManuellAbschicken').addEventListener('click', () => {
        const val = document.getElementById('inputBarcodeManuell').value;
        if(val) speichereProdukt(val);
    });

    document.getElementById('btnScanStarten').addEventListener('click', () => {
        document.getElementById('scanner-container').style.display = 'block';
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            speichereProdukt(text);
            html5QrcodeScanner.stop();
            document.getElementById('scanner-container').style.display = 'none';
        });
    });

    document.getElementById('btnScanStoppen').addEventListener('click', () => {
        if (html5QrcodeScanner) html5QrcodeScanner.stop().then(() => document.getElementById('scanner-container').style.display = 'none');
    });
</script>
</body>
</html>
