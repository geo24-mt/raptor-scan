<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Meine Liste</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="db.js"></script>
</head>
<body>

<div class="container">
    <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <a href="index.html" class="btn">📋 Zum Baukasten</a>
        <a href="dashboard.html" class="btn">🗂️ Zum Dashboard</a>
    </div>
    
    <div class="header-box" style="margin-top: 15px;">
        <h2 id="ansichtListenName">Lade Liste...</h2>
        <button class="btn btn-scan" id="btnScanStarten">📷 Code scannen</button>
    </div>
    
    <div id="scanner-container" style="display:none;">
        <div id="reader"></div>
        <button class="btn btn-stop" id="btnScanStoppen">Kamera ausschalten</button>
    </div>

    <div class="manuell-box">
        <strong>Manuelle Eingabe:</strong>
        <input type="text" id="inputBarcodeManuell" class="input-text" placeholder="Barcode-Nummer...">
        <button class="btn btn-speichern" id="btnManuellAbschicken">Hinzufügen</button>
    </div>
    
    <table id="meineDynamischeTabelle">
        <thead>
            <tr id="tabellenKopfZeile">
                <th>Barcode</th>
                <th>Daten</th>
                <th>Löschen</th>
            </tr>
        </thead>
        <tbody id="tabellenInhalt"></tbody>
    </table>
</div>

<script>
    let listenId = null;
    let html5QrcodeScanner = null;

    window.onload = async function() {
        await initDB();
        const urlParams = new URLSearchParams(window.location.search);
        listenId = urlParams.get('listeIndex');
        console.log("Aktuelle Listen-ID aus URL:", listenId);
        tabelleInitialisieren();
    };

    function tabelleInitialisieren() {
        // SQL-Abfrage mit der ID aus der URL
        const res = dbQuery("SELECT id, name FROM Listen WHERE id = ?", [listenId]);
        
        if (!res || res.length === 0) {
            document.getElementById('ansichtListenName').innerText = "Liste nicht gefunden (ID: " + listenId + ")";
            return;
        }
        
        document.getElementById('ansichtListenName').innerText = res[0].values[0][1];
        
        // Produkte für diese ID laden
        const prodRes = dbQuery("SELECT id, barcode, data FROM Produkte WHERE liste_id = ?", [listenId]);
        renderProdukte(prodRes.length > 0 ? prodRes[0].values : []);
    }

    function renderProdukte(produkte) {
        const tbody = document.getElementById('tabellenInhalt');
        tbody.innerHTML = "";
        produkte.forEach(p => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = p[1]; // Barcode
            row.insertCell(1).innerText = p[2]; // Daten
            row.insertCell(2).innerHTML = `<button class="btn-loeschen" onclick="loescheDatensatz(${p[0]})">✕</button>`;
        });
    }

    function speichereProdukt(barcode, data) {
        dbQuery("INSERT INTO Produkte (liste_id, barcode, data) VALUES (?, ?, ?);", [listenId, barcode, data]);
        tabelleInitialisieren();
    }

    function loescheDatensatz(pId) {
        dbQuery("DELETE FROM Produkte WHERE id = ?;", [pId]);
        tabelleInitialisieren();
    }

    document.getElementById('btnScanStarten').addEventListener('click', () => {
        document.getElementById('scanner-container').style.display = 'block';
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
            speichereProdukt(text, "Gescannter Artikel");
            stoppeKamera();
        });
    });

    document.getElementById('btnScanStoppen').addEventListener('click', stoppeKamera);

    function stoppeKamera() {
        if (html5QrcodeScanner) {
            html5QrcodeScanner.stop().then(() => document.getElementById('scanner-container').style.display = 'none');
        }
    }

    document.getElementById('btnManuellAbschicken').addEventListener('click', () => {
        const val = document.getElementById('inputBarcodeManuell').value;
        if(val) {
            speichereProdukt(val, "Manuelle Eingabe");
            document.getElementById('inputBarcodeManuell').value = "";
        }
    });
</script>
</body>
</html>
